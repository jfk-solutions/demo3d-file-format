<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Demo3D Three Renderer Smoke Test</title>
    <script type="importmap">
      {
        "imports": {
          "three": "../node_modules/three/build/three.module.js",
          "three/webgpu": "../node_modules/three/build/three.webgpu.js",
          "three/addons/": "../node_modules/three/examples/jsm/"
        }
      }
    </script>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        font-family: system-ui, sans-serif;
        color: #e8eef1;
        background: #243f4c;
      }

      body {
        display: grid;
        grid-template-rows: auto 1fr;
      }

      header {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 1rem;
        padding: 0.75rem 1rem;
        border-bottom: 1px solid #dadce0;
        background: #1f343e;
      }

      button {
        border: 1px solid #71848d;
        color: #17242a;
        background: #f4f7f8;
        border-radius: 4px;
        padding: 0.35rem 0.65rem;
        font: inherit;
      }

      .render-switch {
        display: inline-flex;
        align-items: center;
        gap: 0.45rem;
        white-space: nowrap;
        cursor: pointer;
      }

      .render-switch input {
        inline-size: 2.4rem;
        block-size: 1.25rem;
        accent-color: #79bfe0;
        cursor: pointer;
      }

      #layers-panel {
        position: absolute;
        inset-block-start: 1rem;
        inset-inline-end: 1rem;
        z-index: 1;
        inline-size: min(18rem, calc(100% - 2rem));
        max-block-size: min(55vh, 30rem);
        overflow: auto;
        border: 1px solid #71848d;
        border-radius: 4px;
        background: rgb(31 52 62 / 94%);
        color: #e8eef1;
      }

      #layers-panel summary {
        cursor: pointer;
        padding: 0.45rem 0.65rem;
        font-weight: 650;
      }

      #layers-list {
        display: grid;
        gap: 0.3rem;
        padding: 0 0.65rem 0.65rem;
      }

      .layer-toggle {
        display: flex;
        align-items: center;
        gap: 0.45rem;
        min-inline-size: 0;
      }

      .layer-toggle span {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      body.embedded #demo3d-file {
        display: none;
      }

      #viewport-shell {
        position: relative;
        min-height: 0;
        overflow: hidden;
      }

      #viewport {
        display: block;
        width: 100%;
        height: 100%;
        background: #315768;
      }

      .view-cube {
        --cube-size: 4.5rem;
        position: absolute;
        inset-block-end: 1.25rem;
        inset-inline-start: 1.25rem;
        width: 6.5rem;
        height: 6.5rem;
        display: grid;
        place-items: center;
        perspective: 22rem;
        touch-action: none;
        user-select: none;
        cursor: grab;
      }

      .view-cube:active {
        cursor: grabbing;
      }

      .view-cube[hidden] {
        display: none;
      }

      .view-cube-rotator {
        position: relative;
        width: var(--cube-size);
        height: var(--cube-size);
        transform-style: preserve-3d;
        pointer-events: none;
      }

      .view-cube-face {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        border: 1px solid rgba(23, 36, 42, 0.8);
        padding: 0;
        color: #17242a;
        background: rgba(232, 238, 241, 0.88);
        font-size: 0.8rem;
        font-weight: 700;
        backface-visibility: hidden;
        pointer-events: auto;
        cursor: pointer;
      }

      .view-cube-face:hover,
      .view-cube-face:focus-visible {
        background: #79bfe0;
      }

      .view-cube-face[data-view="right"] {
        transform: rotateY(90deg) translateZ(calc(var(--cube-size) / 2));
      }

      .view-cube-face[data-view="left"] {
        transform: rotateY(-90deg) translateZ(calc(var(--cube-size) / 2));
      }

      .view-cube-face[data-view="top"] {
        transform: rotateX(90deg) translateZ(calc(var(--cube-size) / 2));
      }

      .view-cube-face[data-view="bottom"] {
        transform: rotateX(-90deg) translateZ(calc(var(--cube-size) / 2));
      }

      .view-cube-face[data-view="front"] {
        transform: translateZ(calc(var(--cube-size) / 2));
      }

      .view-cube-face[data-view="back"] {
        transform: rotateY(180deg) translateZ(calc(var(--cube-size) / 2));
      }
    </style>
  </head>
  <body>
    <!-- The export page replaces one of these markers with either the source file or a Three.js-only snapshot. -->
    <script id="demo3d-embedded-model" type="application/json">__DEMO3D_EMBEDDED_MODEL__</script>
    <script id="demo3d-embedded-three" type="application/json">__DEMO3D_EMBEDDED_THREE__</script>
    <script>
      // Set this before the header is parsed so an embedded viewer never flashes a file picker.
      if (
        document.querySelector("#demo3d-embedded-model")?.textContent?.trim() !== "__DEMO3D_EMBEDDED_MODEL__" ||
        document.querySelector("#demo3d-embedded-three")?.textContent?.trim() !== "__DEMO3D_EMBEDDED_THREE__"
      ) {
        document.body.classList.add("embedded");
      }
    </script>
    <header>
      <input id="demo3d-file" type="file" accept=".demo3d,.raw3d" />
      <button id="fit-main" type="button" disabled>Fit main</button>
      <button id="fit-all" type="button" disabled>Fit all</button>
      <button id="top-view" type="button" disabled>Top view</button>
      <button id="side-view" type="button" disabled>Side view</button>
      <select id="saved-view" disabled aria-label="Saved view">
        <option value="">Saved views</option>
      </select>
      <label class="render-switch" title="Enable enhanced lighting, soft shadows, and a contact floor">
        <input id="enhanced-render" type="checkbox" role="switch" />
        Better render
      </label>
      <output id="status">Choose a .demo3d or .raw3d file.</output>
    </header>
    <main id="viewport-shell">
      <canvas id="viewport"></canvas>
      <details id="layers-panel" open hidden>
        <summary>Layers</summary>
        <div id="layers-list"></div>
      </details>
      <div id="view-cube" class="view-cube" aria-label="Coordinate cube: click a face or drag to rotate" hidden>
        <div id="view-cube-rotator" class="view-cube-rotator">
          <button class="view-cube-face" data-view="right" type="button" title="View from +X">+X</button>
          <button class="view-cube-face" data-view="left" type="button" title="View from -X">−X</button>
          <button class="view-cube-face" data-view="top" type="button" title="Top view (+Y)">+Y</button>
          <button class="view-cube-face" data-view="bottom" type="button" title="Bottom view (-Y)">−Y</button>
          <button class="view-cube-face" data-view="front" type="button" title="View from +Z">+Z</button>
          <button class="view-cube-face" data-view="back" type="button" title="View from -Z">−Z</button>
        </div>
      </div>
    </main>

    <script type="module">
      import { OrbitControls } from "three/addons/controls/OrbitControls.js";
      import { parseDemo3D, parseRaw3D } from "../dist/index.js";
      import {
        applyDemo3DThreeRenderMode,
        createDemo3DThreeGroup,
        createDemo3DThreeRenderer,
        createRaw3DThreeGroup
      } from "../dist/three/index.js";

      const input = document.querySelector("#demo3d-file");
      const fitMain = document.querySelector("#fit-main");
      const fitAll = document.querySelector("#fit-all");
      const topView = document.querySelector("#top-view");
      const sideView = document.querySelector("#side-view");
      const savedView = document.querySelector("#saved-view");
      const enhancedRender = document.querySelector("#enhanced-render");
      const layersPanel = document.querySelector("#layers-panel");
      const layersList = document.querySelector("#layers-list");
      const status = document.querySelector("#status");
      const canvas = document.querySelector("#viewport");
      const viewCube = document.querySelector("#view-cube");
      const viewCubeRotator = document.querySelector("#view-cube-rotator");

      window.__demo3dRenderResult = { status: "idle" };
      let currentRender = null;
      const rendererMode = new URL(window.location.href).searchParams.get("renderer");

      fitMain.addEventListener("click", () => fitCurrentScene("main"));
      fitAll.addEventListener("click", () => fitCurrentScene("all"));
      topView.addEventListener("click", () => applyAxisView("top"));
      sideView.addEventListener("click", () => applyAxisView("side"));
      savedView.addEventListener("change", () => applySavedView(savedView.value));
      enhancedRender.addEventListener("change", updateCurrentRenderMode);
      initializeViewCube();

      input.addEventListener("change", async () => {
        const file = input.files?.[0];
        if (!file) {
          return;
        }

        await renderFile(file);
      });

      async function renderFile(file) {

        window.__demo3dRenderResult = { status: "parsing" };
        status.value = "Parsing...";

        try {
          const isRaw3D = file.name.toLowerCase().endsWith(".raw3d");
          const bytes = await file.arrayBuffer();
          const parsed = isRaw3D ? await parseRaw3D(bytes) : await parseDemo3D(bytes);
          const views = parsed.model.views;
          const defaultView = isRaw3D ? undefined : parsed.model.defaultView;
          status.value = "Selecting renderer...";
          disposeCurrentRender();
          const selected = await createDemo3DThreeRenderer({
            canvas,
            preferWebGPU: rendererMode !== "webgl",
            antialias: true,
            preserveDrawingBuffer: true,
            powerPreference: "high-performance"
          });
          const THREE = selected.three;

          status.value = "Creating Three objects...";
          const group = isRaw3D
            ? await createRaw3DThreeGroup(parsed, { three: THREE })
            : await createDemo3DThreeGroup(parsed, {
                three: THREE,
                renderProceduralBelts: true,
                renderProceduralRacks: true,
                renderProceduralSupportStands: true,
                renderProceduralConveyorSides: true,
                renderProceduralPhotoEyes: true,
                renderProceduralRollers: true,
                renderProceduralMotors: false,
                renderDimensions: true,
                showPlaceholders: false,
                // Build every layer so the layer panel can make hidden project
                // layers visible later without reloading the file.
                includeHiddenLayers: true,
                includeUnsupported: true
              });

          const layerState = createLayerState(parsed.model.layers, isRaw3D);
          applyLayerVisibility(group, layerState);

          status.value = "Rendering...";
          const scene = new THREE.Scene();
          scene.background = new THREE.Color(0x315768);
          scene.add(group);

          const renderer = selected.renderer;
          renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
          renderer.setSize(canvas.clientWidth, canvas.clientHeight, false);

          const camera = new THREE.PerspectiveCamera(45, canvas.clientWidth / canvas.clientHeight, 0.1, 100000);
          const center = frameCamera(THREE, camera, group, "main");

          const controls = new OrbitControls(camera, canvas);
          controls.target.copy(center);
          controls.update();
          controls.addEventListener("change", () => {
            updateViewCube();
            renderer.render(scene, camera);
          });

          const presentation = applyDemo3DThreeRenderMode({
            three: THREE,
            renderer,
            scene,
            object: group,
            mode: selectedRenderMode(),
            bounds: computeTrimmedBounds(THREE, group)
          });
          currentRender = {
            backend: selected.backend,
            camera,
            controls,
            group,
            presentation,
            renderer,
            scene,
            three: THREE,
            views,
            layerState
          };
          fitMain.disabled = false;
          fitAll.disabled = false;
          topView.disabled = false;
          sideView.disabled = false;
          viewCube.hidden = false;
          updateViewCube();
          populateSavedViews(views, defaultView);
          populateLayers(layerState);
          if (defaultView && views.some((view) => view.name === defaultView)) {
            savedView.value = defaultView;
            applySavedView(defaultView);
          }
          window.addEventListener("resize", resizeCurrentRenderer);

          renderer.render(scene, camera);

          const stats = group.userData.demo3d.stats;
          window.__demo3dRenderResult = {
            status: "rendered",
            backend: selected.backend,
            enhancedGround: Boolean(presentation.ground),
            fallback: selected.fallback?.code,
            renderMode: presentation.mode,
            stats,
            warnings: group.userData.demo3d.warnings.length
          };
          status.value = isRaw3D
            ? `Rendered RAW3D in ${presentation.mode} mode with ${selected.backend === "webgpu" ? "WebGPU" : "WebGL"}: ` +
              `${stats.meshes} mesh instances from ${stats.geometries} geometries, ` +
              `${stats.nodes} nodes, ${stats.materials} materials, ${stats.textures} textures.`
            : `Rendered in ${presentation.mode} mode with ${selected.backend === "webgpu" ? "WebGPU" : "WebGL"}: ${stats.meshes} meshes ` +
              `(${stats.serializedRenderables} placed renderables, ` +
              `${stats.proceduralBelts} belts, ${stats.proceduralRacks} racks, ` +
              `${stats.proceduralSupportStands} support stands, ` +
              `${stats.proceduralConveyorSides} side profiles, ${stats.proceduralPhotoEyes} photo eyes, ` +
              `${stats.proceduralRollers} fallback rollers, ${stats.proceduralMotors} motors, ` +
              `${stats.dimensions} dimensions, ` +
              `${stats.materials} materials, ${stats.textures} textures).`;
        } catch (error) {
          window.__demo3dRenderResult = {
            status: "error",
            message: error instanceof Error ? error.message : String(error)
          };
          status.value = "Render failed.";
          throw error;
        }
      }

      window.__exportDemo3DThreeSnapshot = createThreeSnapshot;

      const embeddedThree = readEmbeddedThreeSnapshot();
      const embeddedModel = embeddedThree ? null : readEmbeddedModel();
      if (embeddedThree) {
        renderThreeSnapshot(embeddedThree);
      } else if (embeddedModel) {
        renderFile({
          name: embeddedModel.name,
          arrayBuffer: async () => base64ToArrayBuffer(embeddedModel.data)
        });
      }

      const sampleUrl = new URL(window.location.href).searchParams.get("sample");
      if (sampleUrl) {
        loadSample(sampleUrl);
      }

      async function loadSample(url) {
        try {
          status.value = "Loading sample...";
          const response = await fetch(url);
          if (!response.ok) {
            throw new Error(`Could not load sample (${response.status}).`);
          }

          const transfer = new DataTransfer();
          const extension = new URL(url, window.location.href).pathname.toLowerCase().endsWith(".raw3d")
            ? ".raw3d"
            : ".demo3d";
          transfer.items.add(new File([await response.blob()], `sample${extension}`));
          input.files = transfer.files;
          input.dispatchEvent(new Event("change"));
        } catch (error) {
          window.__demo3dRenderResult = {
            status: "error",
            message: error instanceof Error ? error.message : String(error)
          };
          status.value = "Sample load failed.";
        }
      }

      function readEmbeddedModel() {
        const element = document.querySelector("#demo3d-embedded-model");
        const source = element?.textContent?.trim();
        if (!source || source === "__DEMO3D_EMBEDDED_MODEL__") {
          return null;
        }

        try {
          const model = JSON.parse(source);
          if (typeof model?.name !== "string" || typeof model?.data !== "string") {
            throw new Error("The embedded model data is incomplete.");
          }
          return model;
        } catch (error) {
          window.__demo3dRenderResult = {
            status: "error",
            message: error instanceof Error ? error.message : String(error)
          };
          status.value = "Embedded model could not be loaded.";
          return null;
        }
      }

      function readEmbeddedThreeSnapshot() {
        const element = document.querySelector("#demo3d-embedded-three");
        const source = element?.textContent?.trim();
        if (!source || source === "__DEMO3D_EMBEDDED_THREE__") {
          return null;
        }

        try {
          const snapshot = JSON.parse(source);
          if (snapshot?.format !== "demo3d-three-snapshot" || !snapshot?.object || !Array.isArray(snapshot?.cameras)) {
            throw new Error("The embedded Three.js snapshot is incomplete.");
          }
          return snapshot;
        } catch (error) {
          window.__demo3dRenderResult = {
            status: "error",
            message: error instanceof Error ? error.message : String(error)
          };
          status.value = "Embedded Three.js snapshot could not be loaded.";
          return null;
        }
      }

      async function renderThreeSnapshot(snapshot) {
        window.__demo3dRenderResult = { status: "loading-three-snapshot" };
        status.value = "Loading generated Three.js objects...";

        try {
          disposeCurrentRender();
          const selected = await createDemo3DThreeRenderer({
            canvas,
            preferWebGPU: rendererMode !== "webgl",
            antialias: true,
            preserveDrawingBuffer: true,
            powerPreference: "high-performance"
          });
          const THREE = selected.three;
          const loader = new THREE.ObjectLoader();
          const group = loader.parse(snapshot.object);
          const layerState = deserializeLayerState(snapshot.layers);
          applyLayerVisibility(group, layerState);

          const scene = new THREE.Scene();
          scene.background = new THREE.Color(0x315768);
          scene.add(group);

          const renderer = selected.renderer;
          renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
          renderer.setSize(canvas.clientWidth, canvas.clientHeight, false);

          const serializedCurrentCamera = snapshot.cameras.find((entry) => entry.role === "current");
          const loadedCamera = serializedCurrentCamera?.object
            ? loader.parse(serializedCurrentCamera.object)
            : null;
          const camera = loadedCamera?.isPerspectiveCamera
            ? loadedCamera
            : new THREE.PerspectiveCamera(45, canvas.clientWidth / canvas.clientHeight, 0.1, 100000);
          camera.aspect = canvas.clientWidth / canvas.clientHeight;
          camera.updateProjectionMatrix();

          const center = serializedCurrentCamera?.target
            ? new THREE.Vector3(...serializedCurrentCamera.target)
            : frameCamera(THREE, camera, group, "main");
          const controls = new OrbitControls(camera, canvas);
          controls.target.copy(center);
          controls.update();
          controls.addEventListener("change", () => {
            updateViewCube();
            renderer.render(scene, camera);
          });

          const views = snapshot.cameras
            .filter((entry) => entry.role === "saved" && entry.object)
            .map((entry) => ({
              name: entry.name,
              camera: loader.parse(entry.object),
              target: entry.target
            }));
          const presentation = applyDemo3DThreeRenderMode({
            three: THREE,
            renderer,
            scene,
            object: group,
            mode: selectedRenderMode(),
            bounds: computeTrimmedBounds(THREE, group)
          });
          currentRender = {
            backend: selected.backend,
            camera,
            controls,
            group,
            presentation,
            renderer,
            scene,
            three: THREE,
            views,
            layerState
          };

          fitMain.disabled = false;
          fitAll.disabled = false;
          topView.disabled = false;
          sideView.disabled = false;
          viewCube.hidden = false;
          updateViewCube();
          populateSavedViews(views, snapshot.defaultView);
          populateLayers(layerState);
          window.addEventListener("resize", resizeCurrentRenderer);
          renderer.render(scene, camera);

          window.__demo3dRenderResult = {
            status: "rendered",
            source: "three-snapshot",
            backend: selected.backend,
            enhancedGround: Boolean(presentation.ground),
            fallback: selected.fallback?.code,
            renderMode: presentation.mode,
            stats: snapshot.stats ?? {},
            warnings: 0
          };
          status.value = `Rendered protected Three.js snapshot in ${presentation.mode} mode with ${
            selected.backend === "webgpu" ? "WebGPU" : "WebGL"
          }.`;
        } catch (error) {
          window.__demo3dRenderResult = {
            status: "error",
            message: error instanceof Error ? error.message : String(error)
          };
          status.value = "Three.js snapshot render failed.";
          throw error;
        }
      }

      function createThreeSnapshot() {
        if (!currentRender) {
          throw new Error("No rendered model is available to export.");
        }

        const object = currentRender.group.toJSON();
        sanitizeThreeObjectJson(object.object);
        const cameras = [{
          name: "Current view",
          role: "current",
          object: currentRender.camera.toJSON(),
          target: currentRender.controls.target.toArray()
        }];

        for (const view of currentRender.views) {
          if (view.camera?.isCamera) {
            cameras.push({
              name: view.name,
              role: "saved",
              object: view.camera.toJSON(),
              target: Array.from(view.target ?? [0, 0, 0])
            });
            continue;
          }

          const camera = currentRender.camera.clone();
          const target = new currentRender.three.Vector3(
            view.target[0] ?? 0,
            view.target[1] ?? 0,
            -(view.target[2] ?? 0)
          );
          camera.position.set(view.position[0] ?? 0, view.position[1] ?? 0, -(view.position[2] ?? 0));
          camera.lookAt(target);
          camera.updateMatrixWorld(true);
          cameras.push({
            name: view.name,
            role: "saved",
            object: camera.toJSON(),
            target: target.toArray()
          });
        }

        return {
          format: "demo3d-three-snapshot",
          version: 1,
          object,
          cameras,
          defaultView: savedView.value || undefined,
          layers: serializeLayerState(currentRender.layerState),
          stats: currentRender.group.userData.demo3d?.stats ?? window.__demo3dRenderResult?.stats ?? {}
        };
      }

      function sanitizeThreeObjectJson(object) {
        if (!object) return;
        const demo3d = object.userData?.demo3d;
        const raw3d = object.userData?.raw3d;
        const userData = {};
        if (demo3d?.kind === "visual" && demo3d.layer !== undefined) {
          userData.demo3d = { kind: "visual", layer: demo3d.layer };
        }
        if (raw3d?.kind === "node" && raw3d.layerIndex !== undefined) {
          userData.raw3d = { kind: "node", layerIndex: raw3d.layerIndex };
        }
        if (Object.keys(userData).length > 0) {
          object.userData = userData;
        } else {
          delete object.userData;
        }
        for (const child of object.children ?? []) sanitizeThreeObjectJson(child);
      }

      function serializeLayerState(layerState) {
        return {
          isRaw3D: layerState.isRaw3D,
          layers: layerState.layers,
          visibility: Array.from(layerState.visibility.entries())
        };
      }

      function deserializeLayerState(layers) {
        return {
          isRaw3D: Boolean(layers?.isRaw3D),
          layers: Array.isArray(layers?.layers) ? layers.layers : [],
          visibility: new Map(Array.isArray(layers?.visibility) ? layers.visibility : [])
        };
      }

      function base64ToArrayBuffer(base64) {
        const binary = atob(base64);
        const bytes = new Uint8Array(binary.length);
        for (let index = 0; index < binary.length; index += 1) {
          bytes[index] = binary.charCodeAt(index);
        }
        return bytes.buffer;
      }

      function createLayerState(layers, isRaw3D) {
        return {
          isRaw3D,
          visibility: new Map(layers.map((layer, index) => [
            isRaw3D ? index : layer.name,
            isRaw3D ? true : layer.visible
          ])),
          layers: layers.map((layer, index) => ({
            key: isRaw3D ? index : layer.name,
            name: layer.name || `Layer ${index + 1}`
          }))
        };
      }

      function populateLayers(layerState) {
        layersList.replaceChildren();
        layersPanel.hidden = layerState.layers.length === 0;
        for (const layer of layerState.layers) {
          const label = document.createElement("label");
          label.className = "layer-toggle";
          const checkbox = document.createElement("input");
          checkbox.type = "checkbox";
          checkbox.checked = layerState.visibility.get(layer.key) !== false;
          checkbox.addEventListener("change", () => {
            layerState.visibility.set(layer.key, checkbox.checked);
            applyLayerVisibility(currentRender.group, layerState);
            currentRender.renderer.render(currentRender.scene, currentRender.camera);
          });
          const name = document.createElement("span");
          name.textContent = layer.name;
          label.append(checkbox, name);
          layersList.append(label);
        }
      }

      function applyLayerVisibility(group, layerState) {
        const visit = (object, demoLayer, rawLayer) => {
          const demoData = object.userData.demo3d;
          const rawData = object.userData.raw3d;
          const nextDemoLayer = demoData?.kind === "visual" && demoData.layer !== undefined
            ? demoData.layer
            : demoLayer;
          const nextRawLayer = rawData?.kind === "node" && rawData.layerIndex !== undefined
            ? rawData.layerIndex
            : rawLayer;
          if (object.isMesh || object.isLine || object.isPoints || object.isSprite) {
            const demoVisible = nextDemoLayer === undefined || layerState.visibility.get(nextDemoLayer) !== false;
            const rawVisible = nextRawLayer === undefined || layerState.visibility.get(nextRawLayer) !== false;
            object.visible = demoVisible && rawVisible;
          }
          for (const child of object.children) visit(child, nextDemoLayer, nextRawLayer);
        };
        visit(group, undefined, undefined);
      }

      function fitCurrentScene(mode) {
        if (!currentRender) {
          return;
        }

        const center = frameCamera(currentRender.three, currentRender.camera, currentRender.group, mode);
        currentRender.controls.target.copy(center);
        currentRender.controls.update();
        currentRender.renderer.render(currentRender.scene, currentRender.camera);
      }

      function applyAxisView(view) {
        if (!currentRender) {
          return;
        }

        const { camera, controls, group, renderer, scene, three: THREE } = currentRender;
        const box = computeTrimmedBounds(THREE, group);
        const center = box.isEmpty() ? new THREE.Vector3() : box.getCenter(new THREE.Vector3());
        const size = box.isEmpty() ? new THREE.Vector3(1, 1, 1) : box.getSize(new THREE.Vector3());
        const axisViews = {
          top: { direction: [0, 1, 0], up: [0, 0, -1], horizontalSize: size.x, verticalSize: size.z, depthSize: size.y },
          bottom: { direction: [0, -1, 0], up: [0, 0, 1], horizontalSize: size.x, verticalSize: size.z, depthSize: size.y },
          side: { direction: [1, 0, 0], up: [0, 1, 0], horizontalSize: size.z, verticalSize: size.y, depthSize: size.x },
          right: { direction: [1, 0, 0], up: [0, 1, 0], horizontalSize: size.z, verticalSize: size.y, depthSize: size.x },
          left: { direction: [-1, 0, 0], up: [0, 1, 0], horizontalSize: size.z, verticalSize: size.y, depthSize: size.x },
          front: { direction: [0, 0, 1], up: [0, 1, 0], horizontalSize: size.x, verticalSize: size.y, depthSize: size.z },
          back: { direction: [0, 0, -1], up: [0, 1, 0], horizontalSize: size.x, verticalSize: size.y, depthSize: size.z }
        };
        const selectedView = axisViews[view];
        if (!selectedView) {
          return;
        }
        const horizontalSize = Math.max(selectedView.horizontalSize, 1);
        const verticalSize = Math.max(selectedView.verticalSize, 1);
        const depthSize = Math.max(selectedView.depthSize, 1);
        const verticalFov = THREE.MathUtils.degToRad(camera.fov);
        const distanceForHeight = verticalSize / (2 * Math.tan(verticalFov / 2));
        const distanceForWidth = horizontalSize / (2 * Math.tan(verticalFov / 2) * camera.aspect);
        const distance = Math.max(distanceForHeight, distanceForWidth) * 1.15 + depthSize / 2;

        camera.position.copy(center).add(
          new THREE.Vector3(...selectedView.direction).multiplyScalar(distance)
        );
        camera.up.set(...selectedView.up);
        camera.near = Math.max((distance - depthSize) / 1000, 0.01);
        camera.far = Math.max(distance + depthSize * 2, 1000);
        camera.updateProjectionMatrix();
        controls.target.copy(center);
        controls.update();
        savedView.value = "";
        renderer.render(scene, camera);

        if (window.__demo3dRenderResult?.status === "rendered") {
          window.__demo3dRenderResult.activeView = view;
        }
      }

      function populateSavedViews(views, defaultView) {
        savedView.replaceChildren(new Option("Saved views", ""));
        for (const view of views) {
          savedView.add(new Option(view.name, view.name, false, view.name === defaultView));
        }
        savedView.disabled = views.length === 0;
      }

      function applySavedView(name) {
        if (!currentRender || !name) {
          return;
        }
        const view = currentRender.views.find((candidate) => candidate.name === name);
        if (!view) {
          return;
        }
        if (view.camera?.isPerspectiveCamera) {
          currentRender.camera.position.copy(view.camera.position);
          currentRender.camera.quaternion.copy(view.camera.quaternion);
          currentRender.camera.up.copy(view.camera.up);
          currentRender.camera.fov = view.camera.fov;
          currentRender.camera.zoom = view.camera.zoom;
          currentRender.controls.target.fromArray(view.target ?? [0, 0, 0]);
        } else {
          // Demo3D and RAW3D use the opposite Z handedness to the Three scene.
          currentRender.camera.position.set(view.position[0] ?? 0, view.position[1] ?? 0, -(view.position[2] ?? 0));
          currentRender.controls.target.set(view.target[0] ?? 0, view.target[1] ?? 0, -(view.target[2] ?? 0));
        }
        const distance = currentRender.camera.position.distanceTo(currentRender.controls.target);
        currentRender.camera.near = Math.max(distance / 1000, 0.01);
        currentRender.camera.far = Math.max(distance * 10, 1000);
        currentRender.camera.updateProjectionMatrix();
        currentRender.controls.update();
        currentRender.renderer.render(currentRender.scene, currentRender.camera);
      }

      function resizeCurrentRenderer() {
        if (!currentRender) {
          return;
        }

        const { camera, renderer, scene } = currentRender;
        renderer.setSize(canvas.clientWidth, canvas.clientHeight, false);
        camera.aspect = canvas.clientWidth / canvas.clientHeight;
        camera.updateProjectionMatrix();
        renderer.render(scene, camera);
      }

      function selectedRenderMode() {
        return enhancedRender.checked ? "enhanced" : "standard";
      }

      function updateCurrentRenderMode() {
        if (!currentRender) {
          return;
        }

        currentRender.presentation.dispose();
        currentRender.presentation = applyDemo3DThreeRenderMode({
          three: currentRender.three,
          renderer: currentRender.renderer,
          scene: currentRender.scene,
          object: currentRender.group,
          mode: selectedRenderMode(),
          bounds: computeTrimmedBounds(currentRender.three, currentRender.group)
        });
        currentRender.renderer.render(currentRender.scene, currentRender.camera);
        if (window.__demo3dRenderResult?.status === "rendered") {
          window.__demo3dRenderResult.renderMode = currentRender.presentation.mode;
          window.__demo3dRenderResult.enhancedGround = Boolean(currentRender.presentation.ground);
        }
        status.value = status.value.replace(
          /in (standard|enhanced) mode/,
          `in ${currentRender.presentation.mode} mode`
        );
      }

      function disposeCurrentRender() {
        if (!currentRender) {
          return;
        }
        currentRender.controls.dispose();
        currentRender.presentation.dispose();
        currentRender.renderer.dispose();
        currentRender = null;
        fitMain.disabled = true;
        fitAll.disabled = true;
        topView.disabled = true;
        sideView.disabled = true;
        viewCube.hidden = true;
        savedView.replaceChildren(new Option("Saved views", ""));
        savedView.disabled = true;
      }

      function initializeViewCube() {
        let pointerId = null;
        let pressedView = null;
        let previousX = 0;
        let previousY = 0;
        let dragged = false;
        let previousClickView = null;
        let previousClickTime = 0;

        viewCube.addEventListener("pointerdown", (event) => {
          if (!currentRender || event.button !== 0) {
            return;
          }
          pointerId = event.pointerId;
          pressedView = event.target.closest("[data-view]")?.dataset.view ?? null;
          previousX = event.clientX;
          previousY = event.clientY;
          dragged = false;
          viewCube.setPointerCapture(pointerId);
        });

        viewCube.addEventListener("pointermove", (event) => {
          if (!currentRender || event.pointerId !== pointerId) {
            return;
          }
          const deltaX = event.clientX - previousX;
          const deltaY = event.clientY - previousY;
          previousX = event.clientX;
          previousY = event.clientY;
          dragged ||= Math.abs(deltaX) + Math.abs(deltaY) > 1;
          if (!dragged) {
            return;
          }

          const { camera, controls, renderer, scene, three: THREE } = currentRender;
          const offset = camera.position.clone().sub(controls.target);
          const spherical = new THREE.Spherical().setFromVector3(offset);
          spherical.theta -= deltaX * 0.012;
          spherical.phi = THREE.MathUtils.clamp(spherical.phi - deltaY * 0.012, 0.001, Math.PI - 0.001);
          camera.up.set(0, 1, 0);
          camera.position.copy(controls.target).add(offset.setFromSpherical(spherical));
          controls.update();
          savedView.value = "";
          renderer.render(scene, camera);
          if (window.__demo3dRenderResult?.status === "rendered") {
            window.__demo3dRenderResult.activeView = "custom";
          }
          event.preventDefault();
        });

        viewCube.addEventListener("pointerup", (event) => {
          if (event.pointerId !== pointerId) {
            return;
          }
          viewCube.releasePointerCapture(pointerId);
          pointerId = null;
          if (!dragged && pressedView) {
            const clickTime = performance.now();
            if (previousClickView === pressedView && clickTime - previousClickTime <= 500) {
              applyAxisView(pressedView);
              previousClickView = null;
              previousClickTime = 0;
            } else {
              previousClickView = pressedView;
              previousClickTime = clickTime;
            }
          }
          pressedView = null;
          dragged = false;
        });

        viewCube.addEventListener("click", (event) => {
          // Keyboard activation of a face produces a click without pointer coordinates.
          if (event.detail === 0) {
            const face = event.target.closest("[data-view]");
            if (face) {
              applyAxisView(face.dataset.view);
            }
          }
        });
      }

      function updateViewCube() {
        if (!currentRender) {
          return;
        }
        const offset = currentRender.camera.position.clone().sub(currentRender.controls.target);
        const radius = Math.max(offset.length(), 0.001);
        const yaw = Math.atan2(offset.x, offset.z) * 180 / Math.PI;
        const pitch = Math.asin(offset.y / radius) * 180 / Math.PI;
        viewCubeRotator.style.transform = `rotateX(${pitch}deg) rotateY(${-yaw}deg)`;
      }

      function frameCamera(THREE, camera, object, mode) {
        const box = mode === "all" ? new THREE.Box3().setFromObject(object) : computeTrimmedBounds(THREE, object);
        if (box.isEmpty()) {
          camera.position.set(10, 10, 10);
          camera.lookAt(0, 0, 0);
          return new THREE.Vector3(0, 0, 0);
        }

        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());
        const radius = Math.max(size.x, size.y, size.z, 1);
        camera.position.copy(center).add(new THREE.Vector3(radius * 0.9, radius * 0.7, radius * 1.1));
        camera.near = Math.max(radius / 1000, 0.01);
        camera.far = radius * 10;
        camera.updateProjectionMatrix();
        camera.lookAt(center);
        return center;
      }

      function computeTrimmedBounds(THREE, object) {
        const meshBounds = [];
        object.updateWorldMatrix(true, true);
        object.traverse((child) => {
          if (!child.isMesh || !child.geometry) {
            return;
          }

          const bounds = new THREE.Box3().setFromObject(child);
          if (!bounds.isEmpty()) {
            meshBounds.push({ bounds, center: bounds.getCenter(new THREE.Vector3()) });
          }
        });

        if (meshBounds.length < 20) {
          return new THREE.Box3().setFromObject(object);
        }

        const x = percentileRange(meshBounds.map((item) => item.center.x));
        const y = percentileRange(meshBounds.map((item) => item.center.y));
        const z = percentileRange(meshBounds.map((item) => item.center.z));
        const trimmed = new THREE.Box3();
        let included = 0;

        for (const item of meshBounds) {
          if (
            item.center.x >= x.min &&
            item.center.x <= x.max &&
            item.center.y >= y.min &&
            item.center.y <= y.max &&
            item.center.z >= z.min &&
            item.center.z <= z.max
          ) {
            trimmed.union(item.bounds);
            included += 1;
          }
        }

        return included > 0 ? trimmed : new THREE.Box3().setFromObject(object);
      }

      function percentileRange(values) {
        const sorted = [...values].sort((a, b) => a - b);
        return {
          min: sorted[Math.floor((sorted.length - 1) * 0.01)],
          max: sorted[Math.floor((sorted.length - 1) * 0.99)]
        };
      }
    </script>
  </body>
</html>
